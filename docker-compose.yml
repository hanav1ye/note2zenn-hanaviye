services:
  app:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app
      - ${HOST_ZENN_REPO_PATH}:${ZENN_REPO_PATH}
    command: sh -c "npm install && tail -f /dev/null"
    depends_on:
      ollama:
        condition: service_healthy
        required: false

  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-llm
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    profiles:
      - local-llm
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull ${OLLAMA_MODEL:-gemma4:E2B}"
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  ollama_data:
